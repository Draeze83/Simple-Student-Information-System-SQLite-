# Student Information System – Configuration
#
# db.path   : Path to the SQLite database file.
#             Use an absolute path for production deployments.
#             Relative paths are resolved from the application's working directory.
#
# Examples:
#   db.path=student_info_system.db               (same folder as the JAR)
#   db.path=C:/SIS/data/student_info_system.db   (Windows absolute)
#   db.path=/opt/sis/data/student_info_system.db (Linux/macOS absolute)
#
db.path=student_info_system.db
